<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="MathJax-config.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/controls/OrbitControls.js"></script>
    <!--
       - a minified version mathbox.min.js is also available;
       - recommend using a specific version (not @latest) in public sites
    -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mathbox@latest/build/bundle/mathbox.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dat.gui@latest/build/dat.gui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathbox@latest/build/mathbox.css" />
    <title>教程</title>
</head>

<body>
    <div id="title-display" style="text-align: center; font-size: 1.5rem; font-weight: 500; margin-bottom: 3rem;"></div>
    <script>document.getElementById('title-display').textContent = document.title </script>

    <div class="mathbox" style="width: 80%; height: 600px; margin: 0 auto;"></div>

    <script>
        var blue = 0x3090ff;
        var white = 0xffffff;

        var props = {
            projectionAngle: 90,
        };
        var gui = new dat.GUI();
        gui.add(props, "projectionAngle").min(0).max(360).step(0.5);

        var mathbox = MathBox.mathBox({
            element: document.querySelector('.mathbox'),
            plugins: ["core", "controls", "cursor"],
            controls: {
                klass: THREE.OrbitControls,
            },
        });

        mathbox.three.camera.position.set(3, 2, 5);
        mathbox.three.renderer.setClearColor(new THREE.Color(0xffffff), 1.0);

        var view = mathbox
            .set({
                scale: 500,
            })
            .cartesian()
            .transform4(
                {},
                {
                    matrix: function () {
                        var a = (props.projectionAngle * MathBox.τ) / 360;
                        return [
                            1,
                            0,
                            0,
                            Math.cos(a),
                            0,
                            1,
                            0,
                            0,
                            0,
                            0,
                            1,
                            Math.sin(a),
                            0,
                            0,
                            0,
                            1,
                        ];
                    },
                }
            );

        view
            .area({
                rangeX: [-3, 1],
                rangeY: [-2 * MathBox.π, 2 * MathBox.π],
                width: 129,
                height: 65,
                expr: function (emit, x, y, i, j) {
                    var r = Math.exp(x);

                    emit(Math.cos(y) * r, Math.sin(y) * r, x, y);
                },
                channels: 4,
            })
            .surface({
                color: white,
                zBias: -0.25,
            })
            .line({
                color: blue,
                width: 4,
            })
            .transpose({
                order: "yxzw",
            })
            .line({
                color: blue,
                width: 4,
            });
    </script>
</body>

</html>
